// QUESTION GENERATOR
// ============================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; }
  return a;
}

function generateQuestions(courseKey, unitIds, count, mix) {
  const bank = QUESTION_BANK[courseKey];
  if (!bank) return [];
  
  const allQ = [];
  
  // Gather from bank
  bank.mc.forEach(q => { if (unitIds.length===0 || unitIds.includes(q.u)) allQ.push({...q, type:"mc"}); });
  bank.tf.forEach(q => { if (unitIds.length===0 || unitIds.includes(q.u)) allQ.push({...q, type:"tf"}); });
  bank.fb.forEach(q => { if (unitIds.length===0 || unitIds.includes(q.u)) allQ.push({...q, type:"fb"}); });
  
  // Assign difficulty based on mix
  const shuffled = shuffle(allQ);
  const easyCount = Math.round(count * mix.easy / 100);
  const medCount = Math.round(count * mix.medium / 100);
  const hardCount = count - easyCount - medCount;
  
  const byDiff = { easy: shuffled.filter(q=>q.d==="easy"), medium: shuffled.filter(q=>q.d==="medium"), hard: shuffled.filter(q=>q.d==="hard") };
  
  const selected = [];
  const pick = (pool, n) => { const p = shuffle(pool); for (let i=0; i<Math.min(n,p.length); i++) selected.push(p[i]); return Math.max(0, n-p.length); };
  
  let leftover = pick(byDiff.easy, easyCount);
  leftover += pick(byDiff.medium, medCount);
  leftover += pick(byDiff.hard, hardCount);
  
  // Fill remaining from any difficulty
  if (leftover > 0) {
    const remaining = shuffled.filter(q => !selected.includes(q));
    pick(remaining, leftover);
  }
  
  // Ensure we have exactly count questions (or close)
  while (selected.length < count && shuffled.length > 0) {
    const extra = shuffled[selected.length % shuffled.length];
    if (!selected.find(s => s.q === extra.q)) selected.push({...extra});
    else break;
  }
  
  return shuffle(selected.slice(0, count)).map((q, i) => ({...q, id: i+1}));
}

  // Question dots
  const dots = state.questions.map((_, i) => {
    const bg = i===state.currentQ ? c.color : state.answers[state.questions[i].id]!==undefined ? c.color+"44" : "#334155";
    const col = i===state.currentQ ? "#fff" : "#94A3B8";
    return `<button onclick="goToQ(${i})" class="q-dot" style="background:${bg};color:${col};border:none">${i+1}</button>`;
  }).join("");

  // Find unit info
  const allUnits = [...COURSES[state.course].units["1donem"], ...COURSES[state.course].units["2donem"]];
  const unitInfo = allUnits.find(u => u.id === q.u);
  const unitLabel = unitInfo ? unitInfo.unit : "";

  app().innerHTML = `
    <div class="fade-in" style="padding-bottom:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-top:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:20px">${c.icon}</span>
          <span style="font-weight:700;font-size:14px">${state.currentQ+1}/${state.questions.length}</span>
        </div>
        <div style="background:#1E293B;border:1px solid #334155;border-radius:8px;padding:4px 12px;font-size:14px;font-weight:600;font-variant-numeric:tabular-nums">⏱ ${formatTime(state.timer)}</div>
      </div>

      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;background:linear-gradient(90deg,${c.color},${c.color}88)"></div></div>

      <div class="card" style="border-radius:20px;padding:20px">
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
          <span class="tag" style="background:${c.color}22;color:${c.color}">${unitLabel}</span>
          <span class="tag" style="background:${diffColors[q.d]}22;color:${diffColors[q.d]}">${diffLabels[q.d]}</span>
          <span class="tag" style="background:#334155;color:#94A3B8">${typeLabels[q.type]}</span>
        </div>
        <p style="font-size:16px;font-weight:700;line-height:1.5;margin:0 0 20px">${q.q}</p>
        ${answerHTML}
        ${expHTML}
      </div>

      <div style="display:flex;gap:8px">${navBtns}</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:16px;justify-content:center">${dots}</div>
    </div>`;
}

function renderResults() {
  const c = COURSES[state.course];
  let correct = 0;
  const byDiff = {easy:{c:0,t:0},medium:{c:0,t:0},hard:{c:0,t:0}};
  const wrongs = [];

  state.questions.forEach(q => {
    byDiff[q.d].t++;
    let isC = false;
    if (q.type==="tf") isC = state.answers[q.id]===q.a;
    else if (q.type==="fb") isC = (state.answers[q.id]||"").toString().trim().toLowerCase()===q.a.toString().toLowerCase();
    else isC = state.answers[q.id]===q.a;
    if (isC) { correct++; byDiff[q.d].c++; }
    else wrongs.push(q);
  });

  const total = state.questions.length;
  const pct = Math.round((correct/total)*100);
  const formatTime = s => `${Math.floor(s/60).toString().padStart(2,"0")}:${(s%60).toString().padStart(2,"0")}`;

  // Save score
  state.scores.push({
    date: new Date().toLocaleDateString("tr-TR"),
    course: c.name,
    icon: c.icon,
    score: correct,
    total,
    pct,
    time: formatTime(state.timer)
  });
  saveScores();

  let emoji, msg;
  if (pct>=90){emoji="🏆";msg="Muhteşem! Harika bir performans!";}
  else if(pct>=70){emoji="🌟";msg="Çok iyi! Biraz daha pratikle mükemmel olur!";}
  else if(pct>=50){emoji="💪";msg="İyi gidiyorsun! Tekrar edersen daha iyi olur!";}
  else{emoji="📚";msg="Konuları tekrar edelim, sen yaparsın!";}

  const diffHTML = Object.entries(byDiff).filter(([,d])=>d.t>0).map(([k,d]) => {
    const colors = {easy:"#22C55E",medium:"#F59E0B",hard:"#EF4444"};
    const labels = {easy:"⭐ Kolay",medium:"⭐⭐ Orta",hard:"⭐⭐⭐ Zor"};
    const w = d.t>0 ? (d.c/d.t)*100 : 0;
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:${colors[k]};font-weight:600">${labels[k]}</span><span style="color:#94A3B8">${d.c}/${d.t}</span></div>
      <div style="height:6px;background:#0F172A;border-radius:3px;overflow:hidden"><div style="height:100%;width:${w}%;background:${colors[k]};border-radius:3px"></div></div>
    </div>`;
  }).join("");

  const wrongsHTML = wrongs.length>0 ? `
    <div class="card" style="border-radius:16px;padding:16px">
      <h3 style="font-size:14px;font-weight:700;margin:0 0 12px;color:#EF4444">❌ Yanlış Cevaplar (${wrongs.length})</h3>
      ${wrongs.map(q => `<div style="background:#0F172A;border-radius:10px;padding:12px;margin-bottom:8px;border-left:3px solid #EF4444">
        <div style="font-size:12px;font-weight:700;margin-bottom:4px">${q.q}</div>
        ${q.e?`<div style="font-size:11px;color:#94A3B8">💡 ${q.e}</div>`:""}
      </div>`).join("")}
    </div>` : "";

  const advice = pct>=80
    ? `Harika! ${c.name} dersinde çok iyi gidiyorsun. "Meydan Okuma" modunu dene!`
    : pct>=50
    ? `İyi başlangıç! Yanlışlarını incele, o konuları tekrar çalış.`
    : `Konuları baştan tekrar edelim. "Rahat Çalışma" modunda kolay sorularla başla.`;

  app().innerHTML = `
    <div class="fade-in" style="padding-top:20px;padding-bottom:20px">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:56px">${emoji}</div>
        <div style="font-size:48px;font-weight:900;font-family:'Baloo 2';background:linear-gradient(135deg,${c.color},#38BDF8);-webkit-background-clip:text;-webkit-text-fill-color:transparent">%${pct}</div>
        <div style="font-size:16px;color:#94A3B8;font-weight:600">${correct} / ${total} doğru</div>
        <div style="font-size:14px;color:#CBD5E1;margin-top:8px">${msg}</div>
        <div style="font-size:13px;color:#64748B;margin-top:4px">⏱ Süre: ${formatTime(state.timer)}</div>
      </div>
      <div class="card" style="border-radius:16px;padding:16px">
        <h3 style="font-size:14px;font-weight:700;margin:0 0 12px">📊 Zorluk Analizi</h3>
        ${diffHTML}
      </div>
      ${wrongsHTML}
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <button onclick="retryQuiz()" style="flex:1;background:${c.color};border:none;border-radius:12px;padding:14px;color:#fff;font-weight:700;font-size:14px">🔄 Tekrar Çöz</button>
        <button onclick="goHome()" style="flex:1;background:#334155;border:none;border-radius:12px;padding:14px;color:#94A3B8;font-weight:700;font-size:14px">🏠 Ana Sayfa</button>
      </div>
      <div style="background:linear-gradient(135deg,#7C3AED22,#6D28D922);border:1px solid #7C3AED44;border-radius:16px;padding:16px">
        <div style="font-size:14px;font-weight:700;margin-bottom:8px">🎓 Öğretmen Önerisi</div>
        <div style="font-size:12px;color:#CBD5E1;line-height:1.6">${advice}</div>
      </div>
    </div>`;
}

function renderAdvisor() {
  const days = [
    {d:"Pazartesi",c:"Matematik",i:"🔢",t:"Sayılar ve işlemler",col:"#4F46E5"},
    {d:"Salı",c:"Türkçe",i:"📖",t:"Dil bilgisi + okuma",col:"#DC2626"},
    {d:"Çarşamba",c:"Fen Bilimleri",i:"🔬",t:"Deney ve gözlem",col:"#059669"},
    {d:"Perşembe",c:"Sosyal Bilgiler",i:"🌍",t:"Tarih ve coğrafya",col:"#D97706"},
    {d:"Cuma",c:"Karma Deneme",i:"🎯",t:"4 dersten karışık",col:"#7C3AED"},
  ];

  app().innerHTML = `
    <div class="fade-in" style="padding-top:12px;padding-bottom:20px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
        <button onclick="goHome()" style="background:#1E293B;border:1px solid #334155;border-radius:10px;padding:8px 12px;color:#94A3B8;font-size:14px">← Geri</button>
        <h2 style="margin:0;font-size:20px;font-family:'Baloo 2'">🎓 Danışman Öğretmen</h2>
      </div>

      <div style="background:linear-gradient(135deg,#7C3AED22,#6D28D922);border:1px solid #7C3AED44;border-radius:20px;padding:24px;margin-bottom:20px">
        <h3 style="font-size:18px;font-weight:800;margin:0 0 12px;font-family:'Baloo 2'">Merhaba! 👋</h3>
        <p style="font-size:14px;line-height:1.7;color:#CBD5E1;margin:0">4. sınıftan 5. sınıfa geçiş çok önemli bir dönem. Birlikte çalışarak seni ortaokula en iyi şekilde hazırlayacağız!</p>
      </div>

      <div class="card" style="padding:20px">
        <h3 style="font-size:15px;font-weight:700;margin:0 0 16px">📋 Haftalık Çalışma Planı</h3>
        ${days.map(p => `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #334155">
          <span style="font-size:24px">${p.i}</span>
          <div style="flex:1"><div style="font-weight:700;font-size:13px">${p.d} — ${p.c}</div><div style="font-size:11px;color:#64748B">${p.t}</div></div>
          <div style="width:8px;height:8px;border-radius:50%;background:${p.col}"></div>
        </div>`).join("")}
      </div>

      <div class="card" style="padding:20px">
        <h3 style="font-size:15px;font-weight:700;margin:0 0 12px">💡 Önemli İpuçları</h3>
        <div style="font-size:13px;color:#CBD5E1;line-height:1.8">
          <div style="margin-bottom:8px">🕐 <strong>Günde 30 dakika</strong> düzenli çalışma en etkili yöntem.</div>
          <div style="margin-bottom:8px">📝 <strong>Yanlış defteri</strong> tut — her yanlışı not al, hafta sonunda tekrar çöz.</div>
          <div style="margin-bottom:8px">🎮 <strong>Ödül sistemi</strong> — her başarılı testten sonra kendine ödül ver.</div>
          <div>🔄 <strong>Tekrar</strong> — aynı testi 2-3 gün sonra tekrar çöz.</div>
        </div>
      </div>

      <div class="card" style="padding:20px">
        <h3 style="font-size:15px;font-weight:700;margin:0 0 12px">🎯 5. Sınıfa Hazırlık Yol Haritası</h3>
        <div style="font-size:13px;color:#CBD5E1;line-height:1.8">
          <div style="margin-bottom:10px;padding:10px;background:#0F172A;border-radius:10px;border-left:3px solid #22C55E"><strong>Mart-Nisan:</strong> 2. dönem konularını pekiştir.</div>
          <div style="margin-bottom:10px;padding:10px;background:#0F172A;border-radius:10px;border-left:3px solid #F59E0B"><strong>Mayıs:</strong> Tüm yıl tekrarı + karma deneme.</div>
          <div style="padding:10px;background:#0F172A;border-radius:10px;border-left:3px solid #4F46E5"><strong>Haziran:</strong> 5. sınıf konularına giriş.</div>
        </div>
      </div>
    </div>`;
}

function renderHistory() {
  const scores = [...state.scores].reverse();
  
  app().innerHTML = `
    <div class="fade-in" style="padding-top:12px;padding-bottom:20px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
        <button onclick="goHome()" style="background:#1E293B;border:1px solid #334155;border-radius:10px;padding:8px 12px;color:#94A3B8;font-size:14px">← Geri</button>
        <h2 style="margin:0;font-size:20px;font-family:'Baloo 2'">📊 Geçmiş Sonuçlar</h2>
      </div>
      ${scores.length===0 ? `<div style="text-align:center;padding:40px;color:#64748B"><div style="font-size:48px;margin-bottom:12px">📝</div><p>Henüz test çözmedin. İlk testini çöz!</p></div>` : 
        scores.map(s => `<div class="card" style="display:flex;align-items:center;gap:12px">
          <span style="font-size:28px">${s.icon}</span>
          <div style="flex:1">
            <div style="font-weight:700;font-size:14px">${s.course}</div>
            <div style="font-size:11px;color:#64748B">${s.date} • ⏱ ${s.time}</div>
          </div>
          <div style="text-align:right">
            <div style="font-weight:800;font-size:18px;color:${s.pct>=70?'#22C55E':s.pct>=50?'#F59E0B':'#EF4444'}">%${s.pct}</div>
            <div style="font-size:11px;color:#94A3B8">${s.score}/${s.total}</div>
          </div>
        </div>`).join("")
      }
    </div>`;
}

// ============================================
// ACTIONS
// ============================================
window.selectCourse = (k) => { state.course=k; state.scope=null; state.selectedUnits=[]; state.screen="setup"; render(); };
window.goHome = () => { clearInterval(state.timerInterval); state.screen="home"; state.course=null; render(); };
window.goAdvisor = () => { state.screen="advisor"; render(); };
window.goHistory = () => { state.screen="history"; render(); };

window.setScope = (k) => {
  state.scope = k;
  const c = COURSES[state.course];
  if (k==="2donem") state.selectedUnits = c.units["2donem"].map(u=>u.id);
  else if (k==="tumyil" || k==="hazirlik") state.selectedUnits = [...c.units["1donem"],...c.units["2donem"]].map(u=>u.id);
  render();
};

window.toggleUnit = (id) => {
  if (state.selectedUnits.includes(id)) state.selectedUnits = state.selectedUnits.filter(x=>x!==id);
  else state.selectedUnits.push(id);
  render();
};

window.selectAllUnits = () => {
  const c = COURSES[state.course];
  state.selectedUnits = [...c.units["1donem"],...c.units["2donem"]].map(u=>u.id);
  render();
};

window.clearUnits = () => { state.selectedUnits=[]; render(); };
window.setQCount = (n) => { state.qCount=n; render(); };
window.setDiff = (key,e,m,h) => { state.diffPreset=key; state.diffMix={easy:e,medium:m,hard:h}; render(); };

window.startQuiz = () => {
  state.questions = generateQuestions(state.course, state.selectedUnits, state.qCount, state.diffMix);
  if (state.questions.length === 0) { alert("Seçilen ünitelerde yeterli soru bulunamadı."); return; }
  state.currentQ = 0;
  state.answers = {};
  state.showExp = false;
  state.timer = 0;
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => { state.timer++; const el=document.querySelector("[data-timer]"); if(el) el.textContent="⏱ "+`${Math.floor(state.timer/60).toString().padStart(2,"0")}:${(state.timer%60).toString().padStart(2,"0")}`; }, 1000);
  state.screen = "quiz";
  render();
};

window.retryQuiz = () => { startQuiz(); };

window.answerMC = (qId, i) => { state.answers[qId]=i; render(); };
window.answerTF = (qId, val) => { state.answers[qId]=val; render(); };
window.answerFB = (qId, val) => { state.answers[qId]=val; };
window.checkAnswer = () => { state.showExp=true; render(); };
window.prevQ = () => { state.currentQ--; state.showExp=false; render(); };
window.nextQ = () => { state.currentQ++; state.showExp=false; render(); };
window.goToQ = (i) => { state.currentQ=i; state.showExp=false; render(); };

window.finishQuiz = () => {
  clearInterval(state.timerInterval);
  state.screen = "results";
  render();
};

// Init
render();
</script>
</body>
</html>
